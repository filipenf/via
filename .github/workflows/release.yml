name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  package:
    name: Package ${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            asset: linux-x86_64

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install Zig
        uses: jdx/mise-action@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev \
            libfreetype6-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Create package
        shell: bash
        run: |
          set -euo pipefail
          package="via-${{ github.event.release.tag_name }}-${{ matrix.asset }}"
          mkdir -p "dist/${package}"
          install -m 0755 "target/${{ matrix.target }}/release/via" "dist/${package}/via"
          cp README.md "dist/${package}/README.md"
          tar -C dist -czf "dist/${package}.tgz" "${package}"
          sha256sum "dist/${package}.tgz" > "dist/${package}.tgz.sha256"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.tgz dist/*.sha256 --clobber
