name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt -- --check
        run: cargo fmt -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Zig
        uses: jdx/mise-action@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev \
            libfreetype6-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo clippy -- -D warnings
        run: cargo clippy -- -D warnings

  test:
    name: test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: jdx/mise-action@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev \
            libfreetype6-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo test --locked
        run: cargo test --locked

  # Optional heavyweight compile check (release) so PRs catch build breaks
  # even if they don't touch the expensive ghostty bits in normal test/clippy.
  # This job is allowed to be slow; it does not block if you prefer to drop it.
  build:
    name: build (release)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add x86_64-unknown-linux-gnu

      - name: Install Zig
        uses: jdx/mise-action@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev \
            libfreetype6-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo build --locked --release
        run: cargo build --locked --release --target x86_64-unknown-linux-gnu

  # Informational benchmark run for hot paths (layout math + link/OSC8 scanning).
  # These are the surfaces most likely to cause user-visible jank or latency regressions.
  # Non-blocking for now; a full `cargo bench` (with more samples) is recommended locally
  # for changes in src/ui/ghostty/layout.rs or src/ui/ghostty/links.rs. See CONTRIBUTING.md.
  bench:
    name: bench (informational)
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: jdx/mise-action@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev \
            libfreetype6-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo bench (quick sample for CI visibility)
        run: |
          cargo bench -- --sample-size 15 --warm-up-time 1 --measurement-time 2 2>&1 | tail -80
