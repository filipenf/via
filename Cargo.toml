[package]
name = "spectre"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.100"
crossbeam-channel = "0.5.15"
fontdue = "0.9.3"
libghostty-vt = "0.1.1"
minifb = "0.28.0"
nvim-rs = { version = "0.9.2", features = ["use_tokio"] }
portable-pty = "0.9.0"
tokio = { version = "1.48.0", features = ["macros", "net", "rt-multi-thread", "signal", "sync", "time"] }
tracing = "0.1.41"
tracing-subscriber = { version = "0.3.20", features = ["env-filter"] }
